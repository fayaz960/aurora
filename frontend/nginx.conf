server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Serve the React single-page app. Any unknown path falls back to index.html
  # so client-side routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Forward /api/* to the backend container. "backend" is the service name
  # from docker-compose — Docker's internal DNS resolves it to the right container.
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
